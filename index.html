<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Cielo Sarahi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <canvas id="starCanvas"></canvas>
    
    <div class="container">
        <div id="message-sequence">
            <h1 class="message" id="msg-1">HAPPY</h1>
            <h1 class="message" id="msg-2">BIRTHDAY</h1>
            <h1 class="message" id="msg-3">A</h1>
            <h1 class="message" id="msg-4">CIELO SARAÍ</h1>
            <div class="message" id="msg-5">
                <svg viewBox="0 0 32 32" class="heart">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <path class="heart-path" d="M16 28C16 28 3 20.5 3 11.5C3 7.5 6 4.5 10 4.5C12.5 4.5 14.5 5.5 16 7.5C17.5 5.5 19.5 4.5 22 4.5C26 4.5 29 7.5 29 11.5C29 20.5 16 28 16 28Z" />
                </svg>
            </div>
        </div>
        <div id="gif-container" class="hidden">
            <img src="gif/Happy-Birthday.gif" alt="Happy Birthday" id="birthday-gif">
        </div>

        <!-- Notebook Phase -->
        <div id="notebook-container" class="hidden">
            <div id="top-message-box" class="hidden">
                <p id="top-message-text"></p>
            </div>

            <div id="notebook-wrapper">
                <div id="notebook-closed">
                    <div class="heart-mini">❤</div>
                    <img src="manos/manos.png" alt="Hands" class="manos-closed">
                </div>
                
                <!-- Two-Page 3D Book -->
                <div id="book-3d" class="hidden">
                    <div class="book-pages-container">
                        <div class="page-side left-page">
                            <div class="photo-decor-container" id="decor-left">
                                <img id="photo-left" src="" alt="">
                            </div>
                        </div>
                        <div class="page-side right-page">
                            <div class="photo-decor-container" id="decor-right">
                                <img id="photo-right" src="" alt="">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <img src="manos/manos.png" alt="Hands" id="manos-swipe" class="hidden">
            <img src="manos/manos.png" alt="Hands" id="manos-final" class="hidden">
        </div>

        <!-- Final Heart Photos Phase -->
        <div id="heart-photos-container" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
